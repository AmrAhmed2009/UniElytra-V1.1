{% extends "layout.html" %}
{% block main %}
<div class="row justify-content-center fade-in-up">
    <div class="col-xl-6 col-lg-8 col-md-10">
        <div class="card border-0 shadow-sm p-5 bg-white rounded-4">
            <h3 class="fw-bold text-dark mb-1">Create Trajectory Profile</h3>
            <p class="text-muted small mb-4">Initialize regional security credentials to track global enrollment access points.</p>
            <hr class="mb-4">

            <form action="/register" method="post" class="row g-3">
                <div class="col-sm-6">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">First Name</label>
                    <input type="text" name="first_name" class="form-control px-3 py-2.5 rounded-3" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Last Name</label>
                    <input type="text" name="last_name" class="form-control px-3 py-2.5 rounded-3" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Email Vector</label>
                    <input type="email" name="email" class="form-control px-3 py-2.5 rounded-3" placeholder="name@domain.com" required>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Username Identity Handle</label>
                    <input type="text" name="username" class="form-control px-3 py-2.5 rounded-3" autocomplete="off" required>
                </div>
                <div class="col-sm-4">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Region Code</label>
                    <select name="phone_code" class="form-select px-3 py-2.5 rounded-3">
                        <option value="+20" selected>Egypt (+20)</option>
                        <option value="+1">United States (+1)</option>
                        <option value="+44">United Kingdom (+44)</option>
                        <option value="+974">Qatar (+974)</option>
                        <option value="+966">Saudi Arabia (+966)</option>
                        <option value="+971">UAE (+971)</option>
                        <option value="+36">Hungary (+36)</option>
                        <option value="+49">Germany (+49)</option>
                    </select>
                </div>
                <div class="col-sm-8">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Mobile Line (Optional)</label>
                    <input type="tel" name="phone_number" class="form-control px-3 py-2.5 rounded-3" placeholder="10XXXXXXXX">
                </div>
                <div class="col-sm-6">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Access Security Key</label>
                    <input type="password" name="password" class="form-control px-3 py-2.5 rounded-3" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label fw-semibold small text-uppercase text-secondary">Confirm Security Key</label>
                    <input type="password" name="confirmation" class="form-control px-3 py-2.5 rounded-3" required>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-uni w-100 py-3 shadow-sm rounded-3">Register Core Workspace</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
