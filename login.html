{% extends "layout.html" %}
{% block main %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-4">
        <div class="card p-5 bg-white shadow-sm mt-5">
            <h3 class="text-center fw-bold mb-4 text-dark">Sign In</h3>
            <p class="text-muted small text-center mb-4">Access your centralized admissions and scholarship launchpad.</p>
            <hr class="mb-4">

            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control px-3 py-2 rounded-3" autocomplete="off" placeholder="Enter your identity handle" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control px-3 py-2 rounded-3" placeholder="Enter security key" required>
                </div>
                <button type="submit" class="btn btn-uni w-100 py-2.5 rounded-pill shadow-sm">Authorize Session</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
